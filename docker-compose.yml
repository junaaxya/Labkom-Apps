services:
  postgres:
    image: postgres:16-alpine
    container_name: labkom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lab_management
    ports:
      - "5432:5432"
    volumes:
      - labkom_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: labkom-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - labkom_redis:/data

volumes:
  labkom_pgdata:
  labkom_redis:
