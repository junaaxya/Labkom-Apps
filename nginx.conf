# nginx.conf — LabKom production reverse proxy
# Mounted by docker-compose.prod.yml at /etc/nginx/nginx.conf
# Frontend: Next.js on container `frontend:3000`
# Backend: Express on container `backend:5000`
#
# Notes
# - SSE endpoint /api/v1/notifications/stream needs no buffering and long timeout.
# - PWA manifest + service worker need `no-cache` so updates roll out fast.
# - Static uploads (avatars) are served by backend, proxied through here.
# - For TLS, mount cert.pem and key.pem under /etc/nginx/ssl. The server block
#   below uses HTTP only by default. Uncomment the 443 block when certs exist.

worker_processes auto;
events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 75;
  client_max_body_size 25m;
  proxy_read_timeout 10m;
  proxy_send_timeout 10m;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types text/plain text/css application/json application/javascript application/xml application/xml+rss text/xml application/manifest+json image/svg+xml;
  gzip_vary on;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  upstream labkom_frontend {
    server frontend:3000;
    keepalive 32;
  }

  upstream labkom_backend {
    server backend:5000;
    keepalive 32;
  }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
  }

  server {
    listen 80 default_server;
    server_name _;

    # SSE: no buffering, long timeout, allow chunked
    location = /api/v1/notifications/stream {
      proxy_pass http://labkom_backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 24h;
      add_header X-Accel-Buffering no;
    }

    # Backend API
    location /api/ {
      proxy_pass http://labkom_backend;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    # Avatars and other public uploads served by backend static handler
    location /uploads/avatars/ {
      proxy_pass http://labkom_backend;
      proxy_cache_bypass $http_pragma;
      add_header Cache-Control "public, max-age=86400";
    }

    # PWA service worker and manifest must not be cached aggressively
    location = /sw.js {
      proxy_pass http://labkom_frontend;
      add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /manifest.json {
      proxy_pass http://labkom_frontend;
      add_header Cache-Control "no-cache";
    }

    # Next.js dynamic and static (Next handles its own immutable cache for /_next/static)
    location / {
      proxy_pass http://labkom_frontend;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }

  # Uncomment when TLS certs are provisioned and mounted at /etc/nginx/ssl
  #
  # server {
  #   listen 443 ssl http2;
  #   server_name lab-ilkom.my.id;
  #
  #   ssl_certificate     /etc/nginx/ssl/cert.pem;
  #   ssl_certificate_key /etc/nginx/ssl/key.pem;
  #   ssl_protocols       TLSv1.2 TLSv1.3;
  #   ssl_ciphers         HIGH:!aNULL:!MD5;
  #   ssl_session_cache   shared:SSL:10m;
  #
  #   include /etc/nginx/conf.d/labkom-locations.inc; # mirror locations from above
  # }
}
