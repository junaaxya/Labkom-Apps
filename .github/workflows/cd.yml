name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ghcr.io/${{ github.repository_owner }}/labkom-apps

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_namespace: ${{ steps.vars.outputs.image_namespace }}
      image_tag: sha-${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image namespace
        id: vars
        run: echo "image_namespace=$(echo '${{ env.IMAGE_NAMESPACE }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract backend metadata
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image_namespace }}/backend
          tags: |
            type=ref,event=branch
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract frontend metadata
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image_namespace }}/frontend
          tags: |
            type=ref,event=branch
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'https://lab-ilkom.my.id/api/v1' }}
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'https://lab-ilkom.my.id' }}
            NEXT_PUBLIC_APP_NAME=${{ vars.NEXT_PUBLIC_APP_NAME || 'LabKom Management System' }}
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}

  deploy:
    runs-on: [self-hosted, linux, x64, labkom]
    needs: docker
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight registry connectivity
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if curl --connect-timeout 10 --max-time 30 -I https://ghcr.io/v2/; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "[FAIL] ghcr.io preflight failed after $attempt attempts"
              exit 1
            fi
            echo "[WARN] ghcr.io preflight failed on attempt $attempt, retrying in 5s"
            sleep 5
          done

          if ! curl --connect-timeout 10 --max-time 30 -I https://github.com; then
            echo "[WARN] github.com preflight failed, continuing because GHCR is the critical dependency for deploy"
          fi

      - name: Login to GHCR with retry
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            if printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin; then
              exit 0
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "[FAIL] docker login ghcr.io failed after $attempt attempts"
              exit 1
            fi
            echo "[WARN] docker login ghcr.io failed on attempt $attempt, retrying in 5s"
            sleep 5
          done

      - name: Run structured deploy script
        env:
          IMAGE_NAMESPACE: ${{ needs.docker.outputs.image_namespace }}
          IMAGE_TAG: ${{ needs.docker.outputs.image_tag }}
          REPO_NAME: ${{ github.repository }}
          BRANCH_NAME: ${{ github.ref_name }}
          SERVER_DEPLOY_ROOT: /srv/apps/labkom-apps/deploy
          DEPLOY_COMPOSE_OVERRIDE_FILE: /srv/apps/labkom-apps/deploy/docker-compose.images.yml
          DEPLOY_ENV_IMAGE_FILE: /srv/apps/labkom-apps/deploy/.env.images
          DEPLOY_BACKEND_ENV_FILE: /srv/apps/labkom-apps/deploy/.env.backend
          DEPLOY_FRONTEND_ENV_FILE: /srv/apps/labkom-apps/deploy/.env.frontend
          DEPLOY_SHARED_ENV_FILE: /srv/apps/labkom-apps/deploy/.env
          DEPLOY_STATE_ROOT: /srv/apps/labkom-apps/deploy/state
        run: |
          chmod +x ./deploy/scripts/*.sh
          ./deploy/scripts/deploy-labkom.sh
