name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ghcr.io/${{ github.repository_owner }}/labkom-apps

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_namespace: ${{ steps.vars.outputs.image_namespace }}
      image_tag: sha-${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image namespace
        id: vars
        run: echo "image_namespace=$(echo '${{ env.IMAGE_NAMESPACE }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract backend metadata
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image_namespace }}/backend
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract frontend metadata
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image_namespace }}/frontend
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'https://lab-ilkom.my.id/api/v1' }}
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'https://lab-ilkom.my.id' }}
            NEXT_PUBLIC_APP_NAME=${{ vars.NEXT_PUBLIC_APP_NAME || 'LabKom Management System' }}
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}

  deploy:
    runs-on: [self-hosted, linux, x64, labkom]
    needs: docker
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image env
        run: |
          cat > /srv/apps/labkom-apps/deploy/.env.images <<EOF
          IMAGE_NAMESPACE=${{ needs.docker.outputs.image_namespace }}
          IMAGE_TAG=${{ needs.docker.outputs.image_tag }}
          EOF
          cat /srv/apps/labkom-apps/deploy/.env.images

      - name: Pull latest images
        run: |
          cd /srv/apps/labkom-apps/deploy
          docker compose -f docker-compose.yml -f docker-compose.images.yml --env-file .env.images pull backend frontend

      - name: Run Prisma migrate deploy
        run: |
          cd /srv/apps/labkom-apps/deploy
          docker compose -f docker-compose.yml -f docker-compose.images.yml --env-file .env.images run --rm backend sh -lc 'npx prisma migrate deploy'

      - name: Restart app services
        run: |
          cd /srv/apps/labkom-apps/deploy
          docker compose -f docker-compose.yml -f docker-compose.images.yml --env-file .env.images up -d backend frontend

      - name: Health check backend
        run: |
          for i in {1..12}; do
            if curl -fsS http://127.0.0.1:8004/api/v1/health; then
              exit 0
            fi
            echo "Health check attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "Backend health check failed after retries"
          exit 1
